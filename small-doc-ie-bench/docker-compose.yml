name: small-doc-ie-bench

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./runs:/app/runs
      - ./annotations:/app/annotations
      - ocr-cache:/app/.cache/ocr
      - serving-state:/app/.serving
      # Durable artifact store shared with the worker: the worker writes
      # report.html/predictions.jsonl here and the api serves them back by id,
      # so results are reachable regardless of which replica produced them.
      - artifact-store:/app/artifacts
    command: ["uvicorn", "docie_bench.api:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py", "http://localhost:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5

  # Self-hosted Inngest server: dashboard + event API (8288) and the Connect
  # WebSocket gateway (8289). Reuses the project Postgres (separate `inngest` DB,
  # created by infra/postgres/init.sql) and a dedicated Redis for run state.
  #
  # Step-budget contract (PR-4 review fix): this server's per-step execution /
  # Connect lease ceiling is NOT pinned here (the OSS binary exposes no
  # documented knob for it), so no worker-side step is allowed to DEPEND on
  # it. The worker awaits cold model loads in bounded ~60s chunks
  # (_AUTOLOAD_STEP_BUDGET_S, inngest/functions.py) even though the total
  # size-aware budget can reach 1800s, and the serving-side `load` step is
  # idempotent-convergent under the per-deployment load lock: an attempt
  # killed at any server limit leaves the load running in-process, and the
  # retry blocks on the lock then no-ops once the spawn completes (see
  # load_deployment_job). Raising server limits is an optimization, never a
  # correctness requirement.
  inngest:
    image: inngest/inngest
    command: ["inngest", "start"]
    # NOTE: do NOT use `env_file: .env` here. The Inngest *binary* reads many
    # INNGEST_* vars itself (e.g. INNGEST_PORT, INNGEST_DEV, INNGEST_BASE_URL),
    # so leaking the SDK/client env into the server makes it bind the wrong port
    # / wrong mode. Pass only what the server needs, explicitly.
    environment:
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:?set INNGEST_EVENT_KEY in .env}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:?set INNGEST_SIGNING_KEY in .env}
      INNGEST_POSTGRES_URI: postgres://docie:docie@postgres:5432/inngest
      INNGEST_REDIS_URI: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Host ports only; the server always listens on 8288/8289 inside the
      # container. Use distinct var names so they can't collide with the
      # server's own INNGEST_PORT config.
      - "${INNGEST_HOST_PORT:-8288}:8288"
      - "${INNGEST_CONNECT_HOST_PORT:-8289}:8289"
    healthcheck:
      test: ["CMD", "inngest", "alpha", "doctor", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # The serving control plane (PR-1, design doc §0.1/P1): a DEDICATED
  # SINGLE-REPLICA service that owns every runtime-process mutation — the
  # deploy/seed/delete Inngest functions plus the background reconciler. It is
  # the sole holder of the llama-server Popen handles and the sole writer of
  # deployments.json; scaling it would reintroduce the multi-writer clobber
  # and round-robin-advertise failure the split exists to prevent.
  #
  # NEVER run `--scale serving=N`. `deploy.replicas: 1` below is ADVISORY for
  # plain `docker compose` (it is only enforced by Swarm) and an explicit
  # `--scale serving=2` overrides it silently. Defense in depth: each replica
  # heartbeats a reconciler lease on the shared serving-state volume, and a
  # second replica that sees a live lease from another instance REFUSES to
  # start its reconciler (loud CRITICAL log). That guard contains the worst
  # damage (N reconcilers clobbering deployments.json) but a second replica
  # still registers duplicate lifecycle handlers — scale>1 stays forbidden.
  #
  # Inngest app: this service registers its OWN app id (docie-serving, see
  # INNGEST_SERVING_APP_ID) with only the lifecycle functions. Per the Inngest
  # Connect contract an app's function set is re-synced on every connect, so
  # serving and worker MUST NOT share one app id with disjoint function lists
  # (registrations would overwrite each other and flap).
  #
  # Reachability: the in-container runtime BINDS 0.0.0.0
  # (DOCIE_SERVING_BIND_HOST) and ADVERTISES this service's name
  # (DOCIE_SERVING_ADVERTISE_HOST=serving) in the DeploymentRecord, so sibling
  # containers reach it at `serving:<port>` over the compose network. A
  # single-replica service name always resolves to the one node that ran the
  # deploy — the deterministic-advertise guard in the control plane becomes
  # belt-and-suspenders. No published `ports:` — that would expose the unauth
  # runtime on 0.0.0.0.
  #
  # Memory (PR-2): the explicit mem_limit makes cgroup-v2 numbers
  # (memory.max/memory.current) the AUTHORITATIVE sizing denominator for the
  # resource tracker — without it memory.max reads the "max" sentinel and the
  # tracker degrades to the elastic Docker Desktop/WSL2 VM view (published
  # with source=vm and badged as soft). Size DOCIE_SERVING_MEM_LIMIT to the
  # RAM you actually grant the GGUF runtimes (weights + KV cache + ~0.5 GB
  # slab per deployment).
  #
  # The 8g DEFAULT is deliberately conservative: on Docker Desktop the WSL2 VM
  # defaults to 50% of host RAM (often 8g), and a mem_limit LARGER than the VM
  # never actually binds — the tracker would publish an authoritative-looking
  # cgroup ceiling the node cannot deliver, and runtimes sized to it get
  # VM-OOM-killed instead of fit-checked. Raise DOCIE_SERVING_MEM_LIMIT only
  # after granting the VM at least that much via %UserProfile%\.wslconfig
  # ([wsl2] memory=24GB, then `wsl --shutdown`).
  serving:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    mem_limit: ${DOCIE_SERVING_MEM_LIMIT:-8g}
    environment:
      # Registers ONLY the lifecycle functions (deploy/seed/delete) under the
      # dedicated docie-serving Inngest app + runs the reconciler, so a
      # serving/* event can only land on this replica.
      DOCIE_WORKER_ROLE: serving
      # Deliberately NOT `${DOCIE_SERVING_ADVERTISE_HOST:-serving}`: a .env
      # written before the PR-1 service split carries
      # DOCIE_SERVING_ADVERTISE_HOST=worker, and interpolating the legacy
      # variable here would make every deploy advertise the SCALED worker
      # service name (round-robin endpoint — the exact failure the split
      # removed). The service pins its own name; to rename it, set the new
      # DOCIE_SERVING_ADVERTISE_HOST_OVERRIDE (the legacy variable is ignored
      # by this service and the worker warns at startup if it names a scaled
      # service).
      DOCIE_SERVING_ADVERTISE_HOST: ${DOCIE_SERVING_ADVERTISE_HOST_OVERRIDE:-serving}
      # Opt INTO an all-interfaces bind so sibling containers (api/worker) can
      # reach the runtime over the compose network. The code default is the
      # safe loopback 127.0.0.1 (so a local `docie up`/`docie serve` never
      # exposes the unauth runtime on the LAN); Docker overrides it here, on
      # the private compose network only.
      DOCIE_SERVING_BIND_HOST: ${DOCIE_SERVING_BIND_HOST:-0.0.0.0}
      DOCIE_SERVING_RECONCILE_INTERVAL: ${DOCIE_SERVING_RECONCILE_INTERVAL:-10}
    restart: unless-stopped
    deploy:
      replicas: 1
    depends_on:
      postgres:
        condition: service_healthy
      inngest:
        condition: service_started
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./runs:/app/runs
      - ./annotations:/app/annotations
      - ocr-cache:/app/.cache/ocr
      - serving-state:/app/.serving
      - artifact-store:/app/artifacts
      # Host Ollama models (read-only) so seed-from-ollama can pull existing GGUF
      # blobs into the store without re-downloading. Set OLLAMA_MODELS_HOST in
      # .env to your host path (e.g. C:/Users/<you>/.ollama/models).
      - ${OLLAMA_MODELS_HOST:-/root/.ollama/models}:/root/.ollama/models:ro
    command: ["docie-worker"]

  # The Connect worker: extraction / benchmark / GC functions only (PR-1 split
  # — runtime lifecycle moved to the single-replica `serving` service above).
  # Replica-safe by construction: benchmark artifacts land in the shared
  # `artifact-store` volume + Postgres index, extraction calls the deployed
  # runtimes over HTTP (`serving:<port>`) and writes only per-deployment
  # recency sidecars (last-write-wins by design), never deployments.json.
  # Scale freely: `docker compose up -d --scale worker=3`.
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    environment:
      # Registers ONLY extraction/benchmark/GC — no lifecycle functions, no
      # reconciler, never spawns a runtime process.
      DOCIE_WORKER_ROLE: worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      inngest:
        condition: service_started
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./runs:/app/runs
      - ./annotations:/app/annotations
      - ocr-cache:/app/.cache/ocr
      - serving-state:/app/.serving
      - artifact-store:/app/artifacts
    command: ["docie-worker"]

  # DocIE Studio web UI (Next.js). NEXT_PUBLIC_* are baked at build time and are
  # the URLs the BROWSER uses, so they default to localhost:<published port>.
  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080}
        NEXT_PUBLIC_GRAFANA_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://localhost:3001}
        # Host port of the Inngest dashboard (matches INNGEST_HOST_PORT).
        NEXT_PUBLIC_INNGEST_URL: ${NEXT_PUBLIC_INNGEST_URL:-http://localhost:8290}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${STUDIO_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  bench:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    profiles: ["tools"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./runs:/app/runs
      - ocr-cache:/app/.cache/ocr
    entrypoint: ["docie-bench"]

  # Local CPU GGUF server. Bring your own model at ./models/model.gguf or set MODEL_PATH.
  # This uses llama-cpp-python's OpenAI-compatible server, not an external SaaS endpoint.
  llm-llamacpp:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.llamacpp
    profiles: ["local-llm"]
    environment:
      MODEL: ${MODEL_PATH:-/models/model.gguf}
      HOST: ${LLAMA_CPP_HOST:-0.0.0.0}
      PORT: ${LLAMA_CPP_PORT:-8000}
      N_CTX: ${LLAMA_CPP_N_CTX:-4096}
      N_THREADS: ${LLAMA_CPP_N_THREADS:-12}
      N_BATCH: ${LLAMA_CPP_N_BATCH:-256}
    volumes:
      - ./models:/models:ro
    ports:
      - "8000:8000"
    command:
      - "python"
      - "-m"
      - "llama_cpp.server"
      - "--model"
      - "${MODEL_PATH:-/models/model.gguf}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--n_ctx"
      - "${LLAMA_CPP_N_CTX:-4096}"
      - "--n_threads"
      - "${LLAMA_CPP_N_THREADS:-12}"
      - "--n_batch"
      - "${LLAMA_CPP_N_BATCH:-256}"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docie
      POSTGRES_PASSWORD: docie
      POSTGRES_DB: docie
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Host port only for external tools; containers reach it as `postgres:5432`.
      # Override if you already run Postgres on 5432: set POSTGRES_PORT=5433.
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docie -d docie"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.0
    profiles: ["observability"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      # Host 3001 to leave 3000 for the DocIE Studio web UI.
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
  grafana-data:
  ocr-cache:
  redis-data:
  serving-state:
  artifact-store:
