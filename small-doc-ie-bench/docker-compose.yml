name: small-doc-ie-bench

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./runs:/app/runs
      - ./annotations:/app/annotations
      - ocr-cache:/app/.cache/ocr
      - serving-state:/app/.serving
      # Durable artifact store shared with the worker: the worker writes
      # report.html/predictions.jsonl here and the api serves them back by id,
      # so results are reachable regardless of which replica produced them.
      - artifact-store:/app/artifacts
    command: ["uvicorn", "docie_bench.api:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py", "http://localhost:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5

  # Self-hosted Inngest server: dashboard + event API (8288) and the Connect
  # WebSocket gateway (8289). Reuses the project Postgres (separate `inngest` DB,
  # created by infra/postgres/init.sql) and a dedicated Redis for run state.
  inngest:
    image: inngest/inngest
    command: ["inngest", "start"]
    # NOTE: do NOT use `env_file: .env` here. The Inngest *binary* reads many
    # INNGEST_* vars itself (e.g. INNGEST_PORT, INNGEST_DEV, INNGEST_BASE_URL),
    # so leaking the SDK/client env into the server makes it bind the wrong port
    # / wrong mode. Pass only what the server needs, explicitly.
    environment:
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:?set INNGEST_EVENT_KEY in .env}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:?set INNGEST_SIGNING_KEY in .env}
      INNGEST_POSTGRES_URI: postgres://docie:docie@postgres:5432/inngest
      INNGEST_REDIS_URI: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Host ports only; the server always listens on 8288/8289 inside the
      # container. Use distinct var names so they can't collide with the
      # server's own INNGEST_PORT config.
      - "${INNGEST_HOST_PORT:-8288}:8288"
      - "${INNGEST_CONNECT_HOST_PORT:-8289}:8289"
    healthcheck:
      test: ["CMD", "inngest", "alpha", "doctor", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # The Connect worker: holds the Inngest functions (extraction, etc.) and dials
  # OUT to the gateway. Reuses Dockerfile.api for the OCR/vision deps.
  # Extraction and benchmark runs are replica-safe now that benchmark artifacts
  # land in the shared `artifact-store` volume + Postgres index (not worker-local
  # paths), so scale freely: `docker compose up -d --scale worker=3`.
  #
  # Model *deploy* reachability (PR-1): the in-worker runtime now BINDS 0.0.0.0
  # (DOCIE_SERVING_BIND_HOST) and ADVERTISES its compose service name
  # (DOCIE_SERVING_ADVERTISE_HOST=worker) in the DeploymentRecord, so the api
  # container reaches it at `worker:8088` over the compose network (no published
  # port needed — do NOT add a `ports:` mapping, that would expose 0.0.0.0).
  # CAVEAT: `serving/deploy.requested` still assumes `--scale worker=1`. Under
  # scale>1, `worker` round-robins across replicas and the advertised name may
  # resolve to a replica that never ran the deploy. Deterministic deploy under
  # scale>1 needs a dedicated single-replica serving service (deferred; PR-1
  # follow-up) — until then keep the worker at one replica for deploys.
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    environment:
      # Advertise the compose service name so the recorded endpoint is
      # cross-container reachable (never a worker-local 127.0.0.1 loopback).
      DOCIE_SERVING_ADVERTISE_HOST: ${DOCIE_SERVING_ADVERTISE_HOST:-worker}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      inngest:
        condition: service_started
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./runs:/app/runs
      - ./annotations:/app/annotations
      - ocr-cache:/app/.cache/ocr
      - serving-state:/app/.serving
      - artifact-store:/app/artifacts
      # Host Ollama models (read-only) so seed-from-ollama can pull existing GGUF
      # blobs into the store without re-downloading. Set OLLAMA_MODELS_HOST in
      # .env to your host path (e.g. C:/Users/<you>/.ollama/models).
      - ${OLLAMA_MODELS_HOST:-/root/.ollama/models}:/root/.ollama/models:ro
    command: ["docie-worker"]

  # DocIE Studio web UI (Next.js). NEXT_PUBLIC_* are baked at build time and are
  # the URLs the BROWSER uses, so they default to localhost:<published port>.
  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080}
        NEXT_PUBLIC_GRAFANA_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://localhost:3001}
        # Host port of the Inngest dashboard (matches INNGEST_HOST_PORT).
        NEXT_PUBLIC_INNGEST_URL: ${NEXT_PUBLIC_INNGEST_URL:-http://localhost:8290}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${STUDIO_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  bench:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    profiles: ["tools"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./runs:/app/runs
      - ocr-cache:/app/.cache/ocr
    entrypoint: ["docie-bench"]

  # Local CPU GGUF server. Bring your own model at ./models/model.gguf or set MODEL_PATH.
  # This uses llama-cpp-python's OpenAI-compatible server, not an external SaaS endpoint.
  llm-llamacpp:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.llamacpp
    profiles: ["local-llm"]
    environment:
      MODEL: ${MODEL_PATH:-/models/model.gguf}
      HOST: ${LLAMA_CPP_HOST:-0.0.0.0}
      PORT: ${LLAMA_CPP_PORT:-8000}
      N_CTX: ${LLAMA_CPP_N_CTX:-4096}
      N_THREADS: ${LLAMA_CPP_N_THREADS:-12}
      N_BATCH: ${LLAMA_CPP_N_BATCH:-256}
    volumes:
      - ./models:/models:ro
    ports:
      - "8000:8000"
    command:
      - "python"
      - "-m"
      - "llama_cpp.server"
      - "--model"
      - "${MODEL_PATH:-/models/model.gguf}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--n_ctx"
      - "${LLAMA_CPP_N_CTX:-4096}"
      - "--n_threads"
      - "${LLAMA_CPP_N_THREADS:-12}"
      - "--n_batch"
      - "${LLAMA_CPP_N_BATCH:-256}"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docie
      POSTGRES_PASSWORD: docie
      POSTGRES_DB: docie
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Host port only for external tools; containers reach it as `postgres:5432`.
      # Override if you already run Postgres on 5432: set POSTGRES_PORT=5433.
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docie -d docie"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.0
    profiles: ["observability"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      # Host 3001 to leave 3000 for the DocIE Studio web UI.
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
  grafana-data:
  ocr-cache:
  redis-data:
  serving-state:
  artifact-store:
